<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>body { font-family: 'Inter', sans-serif; }</style>
    <title>Biblioteca</title>
</head>
<body>
    {% include 'components/navbar.html' %}
    
    <main class="container mt-3">
        {% block content %}{% endblock %}
    </main>

    <button id="theme-toggle" class="btn btn-primary rounded-circle shadow" 
            style="position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; z-index: 1000;" aria-label="Alternar modo escuro">
        <i id="theme-icon" class="bi bi-moon-stars-fill"></i>
    </button>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');

        // Função para aplicar o tema e trocar o ícone
        function setTheme(theme) {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
            
            // Troca o ícone: se for 'dark', mostra o sol (para voltar ao claro), senão mostra a lua
            icon.className = (theme === 'dark') ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
        }

        // Inicialização: verifica se já tem algo salvo
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        // Evento de clique
        toggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        const theme = localStorage.getItem('theme');
        if(theme){
            document.documentElement.setAttribute(
                'data-bs-theme',
                theme
            );
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <title>Biblioteca</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
</head>
<body>
    {% include 'components/navbar.html' %}
    
    <main class="container py-3 py-lg-4">
        {% block content %}{% endblock %}
    </main>

    <button id="theme-toggle" class="theme-toggle shadow" 
            style="position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; z-index: 1000;" aria-label="Alternar modo escuro">
        <i id="theme-icon" class="bi bi-moon-stars-fill"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    <script>
        const toggle = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');

        // Função para aplicar o tema e trocar o ícone
        function setTheme(theme) {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
            
            // Troca o ícone: se for 'dark', mostra o sol (para voltar ao claro), senão mostra a lua
            icon.className = (theme === 'dark') ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
        }

        // Inicialização: verifica se já tem algo salvo
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        // Evento de clique
        toggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Script para realizar o fade out das mensagens de alerta
        document.addEventListener("DOMContentLoaded", function () {
            const alerts = document.querySelectorAll(".alert");

            alerts.forEach(function(alert) {
                setTimeout(function() {
                    bootstrap.Alert.getOrCreateInstance(alert).close();
                }, 3000);
            });
        });

        // Inicializando o tooltips
        document.addEventListener("DOMContentLoaded", function () {
            const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');

            [...tooltipTriggerList].map(el => new bootstrap.Tooltip(el));
        });

        // Validação de campos obrigatórios do fórmulario
        (() => {
            'use strict';

            const forms = document.querySelectorAll('.needs-validation');

            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {

                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }

                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>
</html>

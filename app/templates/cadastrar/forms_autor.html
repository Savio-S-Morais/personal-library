{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>Cadastrar {{ tipo|capitalize }}</h3>
    <form method="POST">
        {% if tipo == 'autor' %}
            <div class="mb-3"><input name="nome_autor" class="form-control" placeholder="Nome do Autor" required></div>
        {% endif %}
        
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{{ url_for('cadastrar.home') }}" class="btn btn-secondary">Voltar</a>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="container py-5 text-center">
    <h2 class="mb-5">O que deseja cadastrar?</h2>
    <div class="row row-cols-1 row-cols-md-2 g-4 justify-content-center">
        {% for tipo in ['Livro', 'Autor', 'Editora', 'Categoria'] %}
        <div class="col">
            <a href="{{ url_for('cadastrar.formulario', tipo=tipo|lower) }}" class="text-decoration-none">
                <div class="card p-4 h-100 shadow-sm hover-shadow">
                    <h4>{{ tipo }}</h4>
                    <p class="text-muted">Adicionar novo registro de {{ tipo }}</p>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="container py-4 py-lg-5">
    <!-- Progresso da biblioteca -->
    <div class="app-card mb-4">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="mb-0">
                    <i class="bi bi-bar-chart cadastro-icon"></i>
                    Progresso da Biblioteca
                </h5>
                <span class="library-counter">
                    {{ total }}/1000
                </span>
            </div>
            <div class="progress mb-3">
                <div class="progress-bar"
                     role="progressbar"
                     style="width: {{ progresso }}%">
                </div>
            </div>
            <p class="app-text-muted mb-0">
                Faltam <strong>{{ falta }}</strong> livros para atingir sua meta.
            </p>
        </div>
    </div>
    <!-- Lista de livros -->
    <div class="row g-4">
        {% for livro in livros %}
        <div class="col-12 col-md-6 col-xl-4">
            <div class="book-card h-100">
                <div class="row g-0">
                    <!-- Capa -->
                    <div class="col-4">
                        <img src="{{ livro.url_capa }}"
                             class="book-cover"
                             alt="Capa do livro {{ livro.titulo }}"
                             onerror="this.onerror=null;this.src='{{ url_for('static', filename='img/sem_capa.jpg') }}';">
                    </div>
                    <!-- Informações -->
                    <div class="col-8">
                        <div class="book-info">
                            <h5 class="book-title">
                                {{ livro.titulo }}
                            </h5>
                            <p class="book-author">
                                <i class="bi bi-person"></i>
                                {{ livro.autor }}
                            </p>
                            <span class="tag-status">
                                {{ livro.status }}
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
